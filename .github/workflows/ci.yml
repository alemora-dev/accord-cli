name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun test tests/common.test.ts tests/providers.test.ts tests/prompts.test.ts tests/artifacts.test.ts tests/teams.test.ts

      - name: Run integration tests
        run: bun test tests/accord.test.ts

      - name: Build binaries
        run: bun run scripts/build.ts

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: accord-binaries
          path: dist/accord-*
