name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify shell syntax
        run: bash -n bin/accord accord/lib/common.sh accord/lib/pipeline.sh accord/lib/prompts.sh accord/lib/providers.sh scripts/version.sh tests/smoke.sh

      - name: Run smoke suite
        run: bash tests/smoke.sh

      - name: Run release packaging
        run: bash scripts/package.sh

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: accord-package
          path: dist/accord-*.tar.gz
