name: Release

on:
  workflow_call:
    inputs:
      tag:
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Verify release tag matches VERSION
        shell: bash
        run: |
          version="$(bash scripts/version.sh current)"
          tag="${{ inputs.tag || github.ref_name }}"

          if [ "$tag" != "v$version" ]; then
            echo "Tag $tag does not match VERSION $version" >&2
            exit 1
          fi

          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build binaries
        run: bun run scripts/build.ts

      - name: Build release archives
        run: bash scripts/package.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/accord-*.tar.gz
          generate_release_notes: true

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish package to GHCR
        shell: bash
        run: |
          owner="$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/$owner/accord-cli"

          args=()
          for archive in dist/accord-*-"${VERSION}".tar.gz; do
            args+=("$archive:application/vnd.accord.release.v1+tar+gzip")
          done

          oras push "$image:v${VERSION}" "${args[@]}"
