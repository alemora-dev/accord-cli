name: Release

on:
  workflow_call:
    inputs:
      tag:
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Verify release tag matches VERSION
        shell: bash
        run: |
          version="$(bash scripts/version.sh current)"
          tag="${{ inputs.tag || github.ref_name }}"

          if [ "$tag" != "v$version" ]; then
            echo "Tag $tag does not match VERSION $version" >&2
            exit 1
          fi

          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build Node.js bundle
        run: bun run scripts/build.ts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/accord.js
          generate_release_notes: true

      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish to npm
        shell: bash
        run: |
          cp dist/accord.js npm/accord.js
          cd npm
          npm version "$VERSION" --no-git-tag-version
          npm publish --access public --provenance --registry https://registry.npmjs.org
